name: Telegram automation

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Pesan dari Telegram'
        required: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-copilot-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install New Copilot CLI (Agent Version)
        run: npm install -g @github/copilot

      - name: Prepare Workspace Permissions
        # Step ini sangat penting untuk mencegah "Permission Denied" saat AI buat folder
        run: |
          sudo chown -R $USER:$USER $GITHUB_WORKSPACE
          chmod -R 777 $GITHUB_WORKSPACE

      - name: Execute Agentic Copilot with Context
        id: copilot_run
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_AGENT_TOKEN }}
        run: |
          USER_MSG="${{ github.event.inputs.message }}"
          
          # Membaca instruksi koding (.md)
          INSTR_FILE=".github/copilot-instructions.md"
          if [ -f "$INSTR_FILE" ]; then
            RULES=$(cat "$INSTR_FILE")
          else
            RULES="Gunakan standar GetX (View, Controller, Binding terpisah)."
          fi
          
          # PROMPT YANG DIPERKUAT:
          # Kita instruksikan AI untuk WAJIB membuat folder jika belum ada.
          copilot -p "ATURAN: $RULES. TUGAS: $USER_MSG. WAJIB: Buat folder baru di 'lib/pages/' jika diperlukan (misal: lib/pages/history/). Pisahkan menjadi file _view.dart, _controller.dart, dan _binding.dart sesuai folder tersebut. Gunakan perintah shell 'mkdir -p' jika folder belum ada." \
            --allow-tool='shell' \
            --allow-tool=write \
            --no-ask-user
          
          echo "Robot telah mencoba membuat struktur folder dan file sesuai instruksi." > summary.txt

      - name: Commit and Push to Repository
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          
          # Cek apakah ada perubahan (file baru atau folder baru)
          git add .
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "feat: auto-generate structured code from Telegram [skip ci]"
            git push origin main
          fi

      - name: Send Notification to Telegram
        if: always()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=🤖 *Agent Copilot Selesai!* 🤖

          Status: Proses pembuatan struktur folder dan file selesai.
          
          Silakan jalankan 'git pull' di VS Code Anda untuk melihat folder baru."
