name: Telegram automation

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Pesan dari Telegram'
        required: true

# Memaksa penggunaan Node.js 24 untuk menghindari peringatan deprecation
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-copilot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Menggunakan versi terbaru

      - name: Install Copilot CLI & GitHub CLI
        run: |
          npm install -g @githubnext/github-copilot-cli
          # Login GitHub CLI secara non-interaktif
          echo "${{ secrets.GH_TOKEN }}" | gh auth login --with-token

      - name: Execute Copilot Command
        id: copilot_step
        run: |
          USER_MSG="${{ github.event.inputs.message }}"
          echo "🚀 Perintah diterima: $USER_MSG"
          
          # 1. Cek versi & perintah yang tersedia (untuk log riset)
          echo "--- CHECKING AVAILABLE COMMANDS ---"
          github-copilot-cli --help || echo "Root help failed"
          
          # 2. Coba gunakan syntax 'gh copilot' jika CLI lama sudah terintegrasi ke gh
          # Jika gagal, coba perintah 'what-the-shell' (perintah populer di versi tertentu)
          if github-copilot-cli what-the-shell "$USER_MSG" > copilot_suggestion.txt; then
            echo "Used what-the-shell"
          elif github-copilot-cli gp "$USER_MSG" > copilot_suggestion.txt; then
            echo "Used gp (git-pilot)"
          else
            echo "Semua perintah gagal. Cek log di atas untuk melihat list perintah yang benar." > copilot_suggestion.txt
          fi
          
          echo "--- LOG OUTPUT ---"
          cat copilot_suggestion.txt

      - name: Send Result back to Telegram
        if: always() # Tetap kirim laporan ke Telegram meski step sebelumnya gagal
        run: |
          # Membaca hasil dari file
          if [ -f copilot_suggestion.txt ]; then
            RESULT=$(cat copilot_suggestion.txt)
          else
            RESULT="File hasil tidak ditemukan. Terjadi kesalahan pada sistem."
          fi
          
          # Kirim ke API Telegram
          # Pastikan TELEGRAM_BOT_TOKEN dan TELEGRAM_CHAT_ID ada di GitHub Secrets
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="🤖 *Hasil Copilot CLI* 🤖
            
          Perintah: ${{ github.event.inputs.message }}
          
          ---
          $RESULT"
