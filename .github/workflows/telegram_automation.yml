name: Telegram automation

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Pesan dari Telegram'
        required: true

# 1. TAMBAHKAN PERMISSIONS (Penting agar robot bisa membaca isi repo)
permissions:
  contents: write  # Diubah jadi write agar bisa buat file suggestion.md

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-copilot-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5 # Update ke v5 sesuai example kamu
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4

      - name: Install New Copilot CLI (Agent Version)
        run: npm install -g @github/copilot

      - name: Execute Agentic Copilot
        id: copilot_run
        env:
          # 2. GANTI NAMA SECRET DISINI (Harus sesuai dengan nama Secret yang kamu buat tadi)
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_AGENT_TOKEN }}
        run: |
          USER_MSG="${{ github.event.inputs.message }}"
          echo "🚀 Perintah diterima: $USER_MSG"
          
          # 3. SESUAIKAN PERINTAH DENGAN EXAMPLE
          # Tambahkan --allow-tool='shell(git:*)' agar dia bisa cek code kamu jika perlu
          copilot -p "Buatkan kode Flutter GetX untuk permintaan ini: $USER_MSG. Tuliskan kode lengkapnya ke file suggestion.md" \
            --allow-tool='shell(git:*)' \
            --allow-tool=write \
            --no-ask-user
          
          echo "--- HASIL GENERASI ---"
          cat suggestion.md

      - name: Send Result back to Telegram
        if: always()
        run: |
          if [ -f suggestion.md ]; then
            RESULT=$(cat suggestion.md)
          else
            RESULT="Gagal mendapatkan hasil kodingan. Cek apakah token Fine-Grained sudah benar."
          fi
          
          # Gunakan --data-urlencode agar pesan yang mengandung simbol kodingan tidak rusak saat dikirim
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=🤖 *Hasil Generasi Agent Copilot* 🤖
            
          Perintah: $USER_MSG
          
          ---
          $RESULT"
