name: Telegram automation

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Pesan dari Telegram'
        required: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-copilot-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Prepare Workspace Permissions
        run: |
          sudo chown -R $USER:$USER $GITHUB_WORKSPACE
          chmod -R 777 $GITHUB_WORKSPACE

      - name: Execute Agentic Copilot
        id: copilot_run
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_AGENT_TOKEN }}
        run: |
          USER_MSG="${{ github.event.inputs.message }}"
          
          # AI diperintahkan mengikuti SOP di copilot-instructions.md
          copilot -p "TUGAS: $USER_MSG. Ikuti aturan ketat di .github/copilot-instructions.md. Buat folder, kode GetX, Unit Test, dan update routing otomatis." \
            --allow-tool='shell' \
            --allow-tool=write \
            --no-ask-user

      - name: Run Unit Tests & Report
        id: run_tests
        run: |
          echo "🧪 Memulai Unit Test..."
          # Menjalankan test dan menyimpan outputnya
          flutter test > test_result.txt 2>&1 || true
          # Ambil 15 baris terakhir untuk ringkasan laporan Telegram
          tail -n 15 test_result.txt > test_summary.txt

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add .
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "feat: auto-code with tests and routes [skip ci]"
            git push origin main
          fi

      - name: Send Report to Telegram
        if: always()
        run: |
          TEST_LOG=$(cat test_summary.txt)
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=🤖 *LAPORAN AGENT COPILOT PRO* 🤖

          ✅ *Status:* Kode & Route Berhasil Diperbarui!
          
          🧪 *Hasil Unit Test:*
          \`\`\`
          $TEST_LOG
          \`\`\`
          
          Silakan jalankan 'git pull' di VS Code Anda untuk melihat folder dan file baru."
