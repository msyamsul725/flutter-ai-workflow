name: Telegram automation

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Pesan dari Telegram'
        required: true

# Memaksa penggunaan Node.js 24 untuk performa lebih baik
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-copilot-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install New Copilot CLI (Agent Version)
        run: npm install -g @github/copilot

      - name: Execute Agentic Copilot
        id: copilot_run
        env:
          # Pastikan kamu menggunakan secret GH_TOKEN yang punya akses Copilot
          COPILOT_GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          USER_MSG="${{ github.event.inputs.message }}"
          echo "🚀 Perintah diterima: $USER_MSG"
          
          # Menggunakan syntax dari example kamu:
          # Kita suruh Copilot menulis kodenya ke file temp 'suggestion.md'
          # --allow-tool=write memungkinkan Copilot membuat file tersebut
          copilot -p "Buatkan kode Flutter GetX untuk permintaan ini: $USER_MSG. Tuliskan kode lengkapnya ke file suggestion.md" --allow-tool=write --no-ask-user
          
          echo "--- HASIL GENERASI ---"
          cat suggestion.md

      - name: Send Result back to Telegram
        if: always()
        run: |
          # Ambil hasil kodingan dari file
          if [ -f suggestion.md ]; then
            RESULT=$(cat suggestion.md)
          else
            RESULT="Gagal mendapatkan hasil kodingan."
          fi
          
          # Kirim ke Telegram
          # Kita gunakan -d text agar kode terkirim sebagai pesan
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="🤖 *Hasil Generasi Agent Copilot* 🤖
            
          Perintah: ${{ github.event.inputs.message }}
          
          ---
          $RESULT"
