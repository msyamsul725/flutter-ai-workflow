name: Telegram automation

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Pesan dari Telegram'
        required: true

# Izin menulis file agar robot bisa push kode ke repo kamu
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-copilot-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install New Copilot CLI (Agent Version)
        run: npm install -g @github/copilot

      - name: Execute Agentic Copilot with Context
        id: copilot_run
        env:
          # Pastikan Secret ini berisi Fine-Grained PAT (github_pat_...)
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_AGENT_TOKEN }}
        run: |
          USER_MSG="${{ github.event.inputs.message }}"
          
          # 1. MENCARI FILE INSTRUKSI (Persis seperti fitur VS Code)
          # Kita cek di folder .github/copilot-instructions.md
          INSTR_FILE=".github/copilot-instructions.md"
          
          if [ -f "$INSTR_FILE" ]; then
            RULES=$(cat "$INSTR_FILE")
            echo "✅ Instruksi khusus ditemukan dan dimuat."
          else
            RULES="Gunakan standar Flutter GetX terbaik."
            echo "⚠️ Instruksi khusus tidak ditemukan, menggunakan standar umum."
          fi
          
          # 2. EKSEKUSI COPILOT AGENT
          # Gabungkan aturan khusus (RULES) dengan permintaan user (USER_MSG)
          copilot -p "Aturan Koding: $RULES. Berdasarkan aturan tersebut, kerjakan tugas ini: $USER_MSG. Tuliskan kode Flutter GetX lengkap ke file lib/pages/auto_generated_page.dart" \
            --allow-tool='shell(git:*)' \
            --allow-tool=write \
            --no-ask-user
          
          echo "Robot telah selesai memproses $USER_MSG sesuai instruksi .md" > summary.txt

      - name: Commit and Push to Repository
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add .
          # Menggunakan [skip ci] agar tidak terjadi perulangan workflow tak terbatas
          git commit -m "feat: auto-generate code with instructions [skip ci]" || echo "No changes to commit"
          git push origin main

      - name: Send Notification to Telegram
        if: always()
        run: |
          if [ -f summary.txt ]; then
            SUMMARY_TEXT=$(cat summary.txt)
          else
            SUMMARY_TEXT="Proses selesai, namun terjadi kendala pada ringkasan."
          fi
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=🤖 *Agent Copilot Selesai!* 🤖

          Status: Kode telah di-push mengikuti file instruksi.
          Info: $SUMMARY_TEXT
          
          Silakan jalankan 'git pull' di VS Code Anda."
