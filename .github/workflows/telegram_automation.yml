name: Telegram automation

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Pesan dari Telegram'
        required: true

# Memberikan izin kepada bot GitHub Actions untuk menulis file ke dalam repositori
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-copilot-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install New Copilot CLI (Agent Version)
        run: npm install -g @github/copilot

      - name: Execute Agentic Copilot
        id: copilot_run
        env:
          # Pastikan Secret ini berisi Fine-Grained PAT (github_pat_...)
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_AGENT_TOKEN }}
        run: |
          USER_MSG="${{ github.event.inputs.message }}"
          echo "🚀 Perintah diterima: $USER_MSG"
          
          # Copilot Agent membuat file kodingan berdasarkan pesan Telegram
          # Kita gunakan flag --allow-tool untuk akses Git dan Write file
          copilot -p "Buatkan kode Flutter GetX lengkap untuk: $USER_MSG. Tuliskan kodenya ke file lib/pages/auto_generated_page.dart" \
            --allow-tool='shell(git:*)' \
            --allow-tool=write \
            --no-ask-user
          
          # Simpan juga penjelasan singkat ke file terpisah untuk dikirim ke Telegram
          echo "Robot telah selesai membuat halaman $USER_MSG di lib/pages/auto_generated_page.dart" > summary.txt

      - name: Commit and Push to Repository
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "feat: auto-generate code from Telegram [skip ci]" || echo "No changes to commit"
          git push origin main

      - name: Send Notification to Telegram
        if: always()
        run: |
          # Mengambil ringkasan dari file summary.txt
          if [ -f summary.txt ]; then
            SUMMARY_TEXT=$(cat summary.txt)
          else
            SUMMARY_TEXT="Proses selesai, namun file summary tidak ditemukan."
          fi
          
          # Kirim ke Telegram menggunakan --data-urlencode agar aman dari simbol aneh
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=🤖 *Laporan Agent Copilot* 🤖

          Status: Sukses di-push ke Repo!
          Detail: $SUMMARY_TEXT
          
          Silakan jalankan 'git pull' di VS Code kamu."
