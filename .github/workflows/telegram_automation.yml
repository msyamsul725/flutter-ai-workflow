name: Telegram automation

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Pesan dari Telegram'
        required: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-copilot-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Prepare Workspace Permissions
        run: |
          sudo chown -R $USER:$USER $GITHUB_WORKSPACE
          chmod -R 777 $GITHUB_WORKSPACE

      - name: Execute Agentic Copilot
        id: copilot_run
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_AGENT_TOKEN }}
        run: |
          USER_MSG="${{ github.event.inputs.message }}"
          copilot -p "TUGAS: $USER_MSG. Ikuti aturan ketat di .github/copilot-instructions.md. Buat folder, kode GetX, Unit Test, dan update routing otomatis." \
            --allow-tool='shell' \
            --allow-tool=write \
            --no-ask-user

      - name: Run Unit Tests & Report
        id: run_tests
        if: |
          contains(github.event.inputs.message, 'tanpa unit test') == false && 
          contains(github.event.inputs.message, 'skip test') == false
        run: |
          echo "🧪 Memulai Unit Test..."
          flutter test > test_result.txt 2>&1 || true
          tail -n 15 test_result.txt > test_summary.txt

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add .
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "feat: auto-code by Asisten Mobile AI [skip ci]"
            git push origin main
          fi

      - name: Send Report to Telegram
        if: always()
        run: |
          USER_INPUT="${{ github.event.inputs.message }}"
          
          # Gunakan variabel untuk menampung teks agar aman dari error sintaks YAML
          if [[ "$USER_INPUT" == *"tanpa unit test"* ]] || [[ "$USER_INPUT" == *"skip test"* ]]; then
             TEST_SECTION="🧪 *Unit Test:* ⚠️ _Skipped by user request_"
          else
             if [ -s test_summary.txt ]; then
                LOG_CONTENT=$(cat test_summary.txt)
                # Format string dengan newline manual untuk shell
                TEST_SECTION="🧪 *Hasil Unit Test:*%0A\`\`\`%0A$LOG_CONTENT%0A\`\`\`"
             else
                TEST_SECTION="🧪 *Unit Test:* ❌ _No test results found_"
             fi
          fi

          # Satukan pesan dalam satu variabel tunggal
          TITLE="📱 *LAPORAN ASISTEN MOBILE AI* 📱"
          STATUS="✅ *Status:* Kode %26 Route Berhasil Diperbarui!"
          FOOTER="🚀 *Next Step:* Silakan jalankan \`git pull\` di VS Code Anda."
          
          FULL_MESSAGE="$TITLE%0A%0A$STATUS%0A%0A$TEST_SECTION%0A%0A$FOOTER"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "parse_mode=Markdown" \
            -d "text=$FULL_MESSAGE"
