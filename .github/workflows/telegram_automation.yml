name: Telegram automation
on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Pesan dari Telegram'
        required: true

jobs:
  run-copilot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Copilot CLI & GitHub CLI
        run: |
          npm install -g @githubnext/github-copilot-cli
          echo "${{ secrets.GH_TOKEN }}" | gh auth login --with-token

      - name: Execute Copilot Command
        run: |
          USER_MSG="${{ github.event.inputs.message }}"
          echo "🚀 Perintah diterima: $USER_MSG"
          
          # Setup alias Copilot
          eval "$(github-copilot-cli alias -- bash)"
          
          # Eksekusi Copilot CLI
          # Kita gunakan perintah 'explain' atau 'suggest' sesuai kebutuhan
          github-copilot-cli suggest "$USER_MSG" > copilot_suggestion.txt
          
          echo "--- HASIL DARI COPILOT ---"
          cat copilot_suggestion.txt

      - name: Send Result back to Telegram
        run: |
          # Membaca isi file hasil saran Copilot
          RESULT=$(cat copilot_suggestion.txt)
          
          # Mengirim pesan ke Telegram menggunakan API Bot
          # Pastikan TOKEN dan CHAT_ID sudah ada di GitHub Secrets
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="🤖 Hasil Copilot untuk: ${{ github.event.inputs.message }}
            
          $RESULT"